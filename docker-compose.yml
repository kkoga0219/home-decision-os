services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hdos
      POSTGRES_PASSWORD: hdos
      POSTGRES_DB: hdos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdos"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      HDOS_DATABASE_URL: postgresql://hdos:hdos@db:5432/hdos
      HDOS_DEBUG: "false"
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:

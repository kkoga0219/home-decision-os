name: 塚口 新着物件アラート

# ⚠️ セットアップ: このファイルを `.github/workflows/tsukaguchi-alert.yml`
# にコピー（移動）してください。GitHub App の権限制約により自動コミットでは
# .github/workflows 配下へ直接配置できないため docs/ に置いています。
#
# 塚口エリア（中古マンション/中古戸建て）の新着を定期巡回し、
# 条件に合う物件が出たら LINE に通知する。
#
# 必要な Secrets:
#   HDOS_LINE_CHANNEL_TOKEN  LINE Messaging API のチャネルアクセストークン (必須)
#   HDOS_LINE_TARGET_ID      通知先 userId/groupId/roomId (任意・空ならブロードキャスト)

on:
  schedule:
    # 3時間ごと（UTC）。JST では 0,3,6,9... 時に相当。
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "LINE送信せず判定のみ"
        type: boolean
        default: false

concurrency:
  group: tsukaguchi-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      HDOS_LINE_CHANNEL_TOKEN: ${{ secrets.HDOS_LINE_CHANNEL_TOKEN }}
      HDOS_LINE_TARGET_ID: ${{ secrets.HDOS_LINE_TARGET_ID }}
      HDOS_ALERT_STATE_PATH: .alert_state/tsukaguchi_seen.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      # Persist the "already seen" listings between scheduled runs so that
      # only genuinely new properties trigger a notification.
      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: backend/.alert_state
          key: tsukaguchi-alert-state-${{ github.run_id }}
          restore-keys: |
            tsukaguchi-alert-state-

      - name: Run alert
        run: |
          python scripts/run_tsukaguchi_alert.py \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
